services:
  mysql:
    image: mysql:8.0
    container_name: instaauto-mysql
    restart: unless-stopped
    ports:
      - "${HOST_MYSQL_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-instaauto}
      MYSQL_USER: ${DB_USERNAME:-instaauto}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - instaauto

  redis:
    image: redis:7-alpine
    container_name: instaauto-redis
    restart: unless-stopped
    ports:
      - "${HOST_REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - instaauto

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instaauto-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - sessions:/storage/sessions
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-instaauto}
      DB_USERNAME: ${DB_USERNAME:-instaauto}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - instaauto

  nginx:
    image: nginx:1.27-alpine
    container_name: instaauto-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - instaauto

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: instaauto-worker
    restart: unless-stopped
    volumes:
      - ./worker:/app
      - sessions:/storage/sessions
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USERNAME:-instaauto}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_DATABASE:-instaauto}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONUNBUFFERED: "1"
      # ローカル動作確認モード: 実 Instagram API を叩かずスタブで応答する.
      LOCAL_MODE: ${LOCAL_MODE:-true}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-demo_account}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD:-stub-password}
      PROXY_URL: ${PROXY_URL:-}
      SESSION_DIR: /storage/sessions
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - instaauto

  node:
    image: node:20-alpine
    container_name: instaauto-node
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      # ブラウザ(CSR)から叩く URL
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      # Server Components / SSR からコンテナネットワーク経由で叩く URL
      INTERNAL_API_URL: http://nginx/api
    networks:
      - instaauto

volumes:
  mysql-data:
  redis-data:
  sessions:

networks:
  instaauto:
    driver: bridge
