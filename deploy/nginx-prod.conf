# -----------------------------------------------------------------------------
# 本番 nginx 設定例 (HTTPS は Let's Encrypt で別途取得)
# /etc/nginx/sites-available/unara に配置し sites-enabled にシンボリックリンク
# -----------------------------------------------------------------------------

server {
    listen 80;
    server_name api.unara.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.unara.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.unara.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.unara.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /home/unara/backend/public;
    index index.php;

    # 設計書 §9.1 セキュリティ要件: 全 API は HTTPS 必須.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 16M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
